name: Phase 3 engineering dataset

on:
  push:
    branches:
      - agent/phase-3-engineering-dataset
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  dataset-core:
    name: Dataset core (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements-core.txt
      - name: Install Phase 3 dependencies
        run: python -m pip install -r requirements-core.txt
      - name: Compile domain, persistence, adapters, UI and tests
        run: python -m compileall -q dieselpdf tests DieselPDF.pyw
      - name: Run coordinate and engineering dataset tests
        run: python -m unittest -v tests.test_phase2_coordinate_core tests.test_phase2_dependency_direction tests.test_phase3_engineering_dataset

  full-legacy-ui:
    name: Full legacy and dataset UI regression
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements-core.txt
      - name: Install Tk virtual display and Phase 3 dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --yes python3-tk xvfb
          python -m pip install -r requirements-core.txt
      - name: Run the complete repository suite under Xvfb
        run: xvfb-run -a python -m unittest discover -s tests -v
