name: Apply Phase 3 implementation payload

on:
  push:
    branches:
      - agent/phase-3-dataset-persistence
  pull_request:
    branches:
      - agent/phase-2-coordinate-grid-core

permissions:
  contents: write

jobs:
  apply:
    if: ${{ hashFiles('tools/phase3_payload.py') != '' }}
    runs-on: ubuntu-latest
    env:
      TARGET_BRANCH: ${{ github.head_ref || github.ref_name }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.head_ref || github.ref_name }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Verify and extract implementation
        run: python tools/phase3_payload.py
      - name: Replace bootstrap with Phase 3 implementation
        run: |
          rm -f tools/phase3_payload.py .github/workflows/phase3-bootstrap.yml .phase3-bootstrap-trigger
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Complete Phase 3 engineering dataset and persistence"
          git push origin "HEAD:${TARGET_BRANCH}"
