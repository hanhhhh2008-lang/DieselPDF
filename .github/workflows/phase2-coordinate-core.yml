name: Phase 2 coordinate core

on:
  push:
    branches:
      - agent/phase-2-coordinate-grid-core
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install Tk runtime for legacy smoke tests
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-tk xvfb
      - name: Compile
        run: python -m compileall -q dieselpdf tests DieselPDF.pyw
      - name: Unit and regression tests
        run: xvfb-run -a python -m unittest discover -s tests -v
